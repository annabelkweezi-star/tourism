<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e0e0e0;
}

 header{
                        background-color:rgb(29, 29, 106);
                        color: #f5f5f0;
                        padding: 5px;
                        display: flex;
                        justify-content: space space-between;
                        align-items: center;
                    }
                  nav a {
    color: white;
    margin-left: 25px;
    text-decoration: none;
    font-weight: 500;
    position: relative;
}

/* Underline animation */
nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #a5d6a7;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
    color: #2e7d32;
    text-align: center;
}

.contact-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 20px;
}

.info, .form {
    flex: 1;
    min-width: 280px;
}

.info p {
    margin: 10px 0;
    font-size: 16px;
}

form {
    display: flex;
    flex-direction: column;
}

input, textarea {
    margin-bottom: 15px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    background: #1b5e20;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #2e7d32;
}

footer {
    background-color: #1b5e20;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
}
</style>

</head>
